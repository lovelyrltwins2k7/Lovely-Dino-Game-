<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovely Dino: Audio & Dynamic Update</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        :root {
            --primary-color: #ff6b6b;
            --btn-shadow: #c44d4d;
            --coin-color: #ff4757;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333;
            font-family: 'Fredoka One', cursive, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-radius: 15px;
            overflow: hidden;
            width: 800px;
            height: 300px;
            background: #fff0f3;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI LAYERS */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s;
            z-index: 10;
        }

        #home-screen { background: rgba(255, 240, 243, 0.95); }
        #skins-screen { background: rgba(255, 240, 243, 0.98); }
        #game-over-screen { background: rgba(0, 0, 0, 0.4); }
        #pause-screen { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(5px); }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* HUD */
        #hud-layer {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: #ff6b6b;
            font-size: 20px;
            pointer-events: none;
            z-index: 5;
            text-shadow: 1px 1px 0 #fff;
        }

        .hud-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            pointer-events: auto;
        }

        .coin-counter {
            color: var(--coin-color);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* BUTTONS */
        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            border-radius: 30px;
            margin: 5px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--btn-shadow);
            transition: transform 0.1s, box-shadow 0.1s;
            min-width: 140px;
        }

        .btn:active { transform: translateY(5px); box-shadow: 0 0 0 var(--btn-shadow); }
        .btn-secondary { background: #f8c291; --btn-shadow: #d6a275; }
        
        /* FIXED SHOP BUTTONS */
        .btn-buy {
            background: #2ed573;
            --btn-shadow: #26af61;
            padding: 8px 0; /* Taller */
            font-size: 16px;
            margin-top: 8px;
            width: 100%; /* Full width */
            box-sizing: border-box; /* Ensures padding doesn't break width */
            border-radius: 8px;
            box-shadow: 0 4px 0 var(--btn-shadow);
        }
        
        .btn-disabled {
            background: #ccc;
            --btn-shadow: #999;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 4px 0 #999;
        }

        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            min-width: auto;
            padding: 8px 15px;
            font-size: 16px;
        }

        .btn-pause {
            background: white;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        /* SHOP TABS */
        .shop-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab-btn {
            background: #ddd;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Fredoka One';
            color: #666;
        }
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* WALLET DISPLAY */
        .wallet-display {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            color: var(--coin-color);
            font-size: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
        }

        /* GRID */
        #shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
        }

        .shop-card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            border: 3px solid #eee;
            text-align: center;
            transition: 0.2s;
            position: relative;
            width: 100px; /* Slightly wider */
        }

        .shop-card.selected { border-color: #2ed573; background: #eafff2; }
        .shop-card.locked { opacity: 0.8; }

        .item-preview {
            width: 50px;
            height: 50px;
            margin: 0 auto 5px auto;
            border-radius: 5px;
            border: 1px solid #eee;
            background-size: cover;
        }

        .item-name { font-size: 14px; color: #555; margin-bottom: 5px; }

        /* SNAPSHOT POLAROID */
        .polaroid-card {
            background: white;
            padding: 15px 15px 50px 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transform: rotate(-3deg);
            text-align: center;
            animation: floatIn 0.5s ease-out;
            max-width: 300px;
        }

        @keyframes floatIn {
            0% { transform: translateY(50px) rotate(0deg); opacity: 0; }
            100% { transform: translateY(0) rotate(-3deg); opacity: 1; }
        }

        .polaroid-text { font-family: 'Fredoka One', cursive; color: #444; font-size: 24px; margin-top: 20px; margin-bottom: 10px; }
        .score-display { font-size: 16px; color: #888; margin-bottom: 20px; }

    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    
    <!-- HUD -->
    <div id="hud-layer" class="hidden">
        <div class="hud-left">Score: <span id="scoreText">0</span></div>
        <div class="hud-right">
            <button class="btn-pause" onclick="togglePause()">||</button>
            <div class="coin-counter">
                <span>❤️</span> <span id="hudWallet">0</span>
            </div>
        </div>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="ui-screen">
        <h1>Lovely Dino</h1>
        <div class="wallet-display"><span>❤️</span> <span id="homeWallet">0</span></div>
        <button class="btn" onclick="startGame()">Start Game</button>
        <button class="btn btn-secondary" onclick="showShop()">Shop</button>
        <div style="margin-top: 15px; color: #ff6b6b; font-size: 14px;">High Score: <span id="homeHighScore">0</span></div>
    </div>

    <!-- SHOP SCREEN -->
    <div id="skins-screen" class="ui-screen hidden">
        <button class="btn btn-secondary btn-back" onclick="showHome()">← Back</button>
        <h2>Lovely Shop</h2>
        <div class="wallet-display"><span>❤️</span> <span id="storeWallet">0</span></div>
        
        <div class="shop-tabs">
            <button class="tab-btn active" id="tabSkins" onclick="switchTab('skins')">Skins</button>
            <button class="tab-btn" id="tabThemes" onclick="switchTab('themes')">Themes</button>
        </div>

        <div id="shop-grid">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- PAUSE SCREEN -->
    <div id="pause-screen" class="ui-screen hidden">
        <h1>Paused</h1>
        <button class="btn" onclick="togglePause()">Resume</button>
        <button class="btn btn-secondary" onclick="showHome()">Quit</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="ui-screen hidden">
        <div class="polaroid-card">
            <div class="polaroid-text" id="failMessage">Ouch!</div>
            <div class="score-display">Score: <span id="finalScore">0</span> | Best: <span id="finalBest">0</span></div>
            <button class="btn" onclick="startGame()">Try Again</button>
            <button class="btn btn-secondary" onclick="showHome()">Menu</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI References
    const homeScreen = document.getElementById('home-screen');
    const skinsScreen = document.getElementById('skins-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const pauseScreen = document.getElementById('pause-screen');
    const hudLayer = document.getElementById('hud-layer');
    
    const scoreText = document.getElementById('scoreText');
    const hudWallet = document.getElementById('hudWallet');
    const homeWallet = document.getElementById('homeWallet');
    const storeWallet = document.getElementById('storeWallet');
    const homeHighScoreSpan = document.getElementById('homeHighScore');
    
    const shopGrid = document.getElementById('shop-grid');
    const tabSkins = document.getElementById('tabSkins');
    const tabThemes = document.getElementById('tabThemes');

    // --- SOUND SYSTEM (Procedural Audio) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    const sounds = {
        jump: () => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        },
        coin: () => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        },
        hype: () => {
            const now = audioCtx.currentTime;
            [440, 554, 659].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, now + i*0.1);
                gain.gain.linearRampToValueAtTime(0, now + i*0.1 + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i*0.1);
                osc.stop(now + i*0.1 + 0.3);
            });
        },
        crash: () => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    };

    function playSound(name) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        if(sounds[name]) sounds[name]();
    }

    // --- DATA & STATE ---
    let currency = parseInt(localStorage.getItem('lovelyDinoCurrency')) || 0;
    let inventory = JSON.parse(localStorage.getItem('lovelyDinoInventory')) || [0];
    let themeInventory = JSON.parse(localStorage.getItem('lovelyDinoThemeInventory')) || [0];
    let highScore = localStorage.getItem('lovelyDinoHighScore') || 0;
    
    let currentSkinId = parseInt(localStorage.getItem('lovelyDinoSkin')) || 0;
    let currentThemeId = parseInt(localStorage.getItem('lovelyDinoTheme')) || 0;

    let gameRunning = false;
    let isPaused = false;
    let animationId;
    let frame = 0;
    let score = 0;
    let gameSpeed = 5;
    
    // Combo System
    let obstacleCombo = 0;
    let hypeTexts = [];

    // --- DATABASE ---
    const skins = [
        { id: 0, name: "Classic", price: 0,   color: '#ff6b6b', legColor: '#d64545', accessory: 'none' },
        { id: 1, name: "Minty",   price: 50,  color: '#4ecdc4', legColor: '#369c95', accessory: 'none' },
        { id: 2, name: "Sunset",  price: 100, color: '#ff9f43', legColor: '#e58e26', accessory: 'sunglasses' },
        { id: 3, name: "Bubble",  price: 150, color: '#ff9ff3', legColor: '#f368e0', accessory: 'bow' },
        { id: 4, name: "Noir",    price: 200, color: '#576574', legColor: '#222f3e', accessory: 'bowtie' },
        { id: 5, name: "Royal",   price: 300, color: '#5f27cd', legColor: '#341f97', accessory: 'crown' }
    ];

    const themes = [
        { 
            id: 0, name: "Default", price: 0, 
            sky: '#fff0f3', ground: '#ffb7b2', obsColor: '#1dd1a1', obsType: 'cactus' 
        },
        { 
            id: 1, name: "Candy", price: 200, 
            sky: '#e2f0cb', ground: '#c7ceea', obsColor: '#ff9ff3', obsType: 'lollipop' 
        },
        { 
            id: 2, name: "Space", price: 300, 
            sky: '#2c3e50', ground: '#34495e', obsColor: '#95a5a6', obsType: 'rock' 
        }
    ];

    let currentShopTab = 'skins';

    // --- UPDATE UI ---
    homeHighScoreSpan.innerText = Math.floor(highScore);
    updateWalletUI();

    function updateWalletUI() {
        homeWallet.innerText = currency;
        storeWallet.innerText = currency;
        hudWallet.innerText = currency;
        localStorage.setItem('lovelyDinoCurrency', currency);
    }

    // --- SHOP LOGIC ---
    function switchTab(tab) {
        currentShopTab = tab;
        tabSkins.className = tab === 'skins' ? 'tab-btn active' : 'tab-btn';
        tabThemes.className = tab === 'themes' ? 'tab-btn active' : 'tab-btn';
        renderShop();
    }

    function renderShop() {
        shopGrid.innerHTML = '';
        const items = currentShopTab === 'skins' ? skins : themes;
        const ownedList = currentShopTab === 'skins' ? inventory : themeInventory;
        const currentId = currentShopTab === 'skins' ? currentSkinId : currentThemeId;

        items.forEach(item => {
            const isOwned = ownedList.includes(item.id);
            const isSelected = currentId === item.id;

            const card = document.createElement('div');
            card.className = `shop-card ${isSelected ? 'selected' : ''} ${!isOwned ? 'locked' : ''}`;
            
            // Preview
            const preview = document.createElement('div');
            preview.className = 'item-preview';
            if(currentShopTab === 'skins') {
                preview.style.backgroundColor = item.color;
            } else {
                preview.style.backgroundColor = item.sky;
                preview.style.borderBottom = `10px solid ${item.ground}`;
            }
            card.appendChild(preview);
            
            // Name
            const name = document.createElement('div');
            name.className = 'item-name';
            name.innerText = item.name;
            card.appendChild(name);

            // Button
            const btn = document.createElement('button');
            btn.className = 'btn btn-buy';
            
            if (isSelected) {
                btn.innerText = "Used";
                btn.className += " btn-disabled";
                btn.disabled = true;
            } else if (isOwned) {
                btn.innerText = "Equip";
                btn.onclick = () => equipItem(item.id);
            } else {
                btn.innerText = `Buy ${item.price}`;
                if (currency >= item.price) {
                    btn.onclick = () => buyItem(item.id, item.price);
                } else {
                    btn.className += " btn-disabled";
                    btn.disabled = true;
                }
            }
            card.appendChild(btn);
            shopGrid.appendChild(card);
        });
    }

    function buyItem(id, price) {
        if (currency >= price) {
            currency -= price;
            playSound('coin'); // Sound effect
            updateWalletUI();
            
            if (currentShopTab === 'skins') {
                inventory.push(id);
                localStorage.setItem('lovelyDinoInventory', JSON.stringify(inventory));
                localStorage.setItem('lovelyDinoSkin', id);
                currentSkinId = id;
            } else {
                themeInventory.push(id);
                localStorage.setItem('lovelyDinoThemeInventory', JSON.stringify(themeInventory));
                localStorage.setItem('lovelyDinoTheme', id);
                currentThemeId = id;
            }
            renderShop();
        }
    }

    function equipItem(id) {
        playSound('jump'); // Sound effect
        if (currentShopTab === 'skins') {
            currentSkinId = id;
            localStorage.setItem('lovelyDinoSkin', id);
        } else {
            currentThemeId = id;
            localStorage.setItem('lovelyDinoTheme', id);
        }
        renderShop();
    }

    // --- GAME ENTITIES ---

    class HypeText {
        constructor(text, x, y) {
            this.text = text; this.x = x; this.y = y; this.life = 1.0; this.dy = -2;
        }
        update() { this.y += this.dy; this.life -= 0.02; }
        draw() {
            ctx.fillStyle = `rgba(255, 107, 107, ${this.life})`;
            ctx.font = "bold 24px 'Fredoka One'";
            ctx.fillText(this.text, this.x, this.y);
        }
    }

    const dino = {
        x: 50, y: 200, width: 40, height: 45,
        dy: 0, jumpForce: 13, gravity: 0.6,
        grounded: false, timer: 0,
        jumpCount: 0, maxJumps: 2,
        crashed: false,

        draw: function () {
            const skin = skins.find(s => s.id === currentSkinId) || skins[0];
            let legOffset = 0;
            if (this.grounded && gameRunning && !this.crashed) {
                this.timer++;
                if ((this.timer % 14) > 7) legOffset = 5;
            }

            // Body
            ctx.fillStyle = skin.color;
            ctx.fillRect(this.x, this.y + 15, 30, 25);
            ctx.fillRect(this.x + 20, this.y, 24, 25);
            ctx.fillRect(this.x + 35, this.y + 10, 15, 12);
            ctx.fillRect(this.x - 5, this.y + 20, 10, 10);
            
            // Legs
            ctx.fillStyle = skin.legColor;
            ctx.fillRect(this.x + 5, this.y + 40, 8, 10 - legOffset);
            ctx.fillRect(this.x + 20, this.y + 40, 8, 5 + legOffset);

            // Expressions
            ctx.fillStyle = 'white'; 
            ctx.fillRect(this.x + 28, this.y + 4, 6, 6);
            
            ctx.fillStyle = 'black'; 
            if (this.crashed) {
                ctx.lineWidth = 2; ctx.strokeStyle = '#333'; ctx.beginPath();
                ctx.moveTo(this.x + 28, this.y + 4); ctx.lineTo(this.x + 34, this.y + 10);
                ctx.moveTo(this.x + 34, this.y + 4); ctx.lineTo(this.x + 28, this.y + 10);
                ctx.stroke();
            } else if (this.jumpCount === 2) {
                ctx.fillText(">", this.x + 27, this.y + 10);
            } else if (!this.grounded) {
                ctx.fillRect(this.x + 31, this.y + 4, 2, 2);
                ctx.fillStyle = '#a55'; ctx.fillRect(this.x + 38, this.y + 16, 4, 4);
            } else {
                ctx.fillRect(this.x + 31, this.y + 6, 2, 2);
            }

            // Accessories
            if (skin.accessory === 'crown') {
                ctx.fillStyle = '#feca57';
                ctx.beginPath();
                ctx.moveTo(this.x + 20, this.y); ctx.lineTo(this.x + 20, this.y - 10);
                ctx.lineTo(this.x + 28, this.y - 5); ctx.lineTo(this.x + 36, this.y - 10);
                ctx.lineTo(this.x + 44, this.y); ctx.fill();
            } else if (skin.accessory === 'sunglasses') {
                ctx.fillStyle = '#222';
                ctx.fillRect(this.x + 28, this.y + 6, 14, 4);
                ctx.fillRect(this.x + 26, this.y + 7, 20, 1);
            } else if (skin.accessory === 'bowtie') {
                ctx.fillStyle = '#ee5253';
                ctx.beginPath();
                ctx.moveTo(this.x + 25, this.y + 42); ctx.lineTo(this.x + 18, this.y + 38);
                ctx.lineTo(this.x + 18, this.y + 46); ctx.fill();
                ctx.beginPath();
                ctx.moveTo(this.x + 25, this.y + 42); ctx.lineTo(this.x + 32, this.y + 38);
                ctx.lineTo(this.x + 32, this.y + 46); ctx.fill();
            } else if (skin.accessory === 'bow') {
                ctx.fillStyle = '#ff4757';
                ctx.beginPath();
                ctx.arc(this.x + 22, this.y - 2, 5, 0, Math.PI * 2); ctx.fill();
            }
        },
        update: function () {
            this.y += this.dy;
            if (this.y + this.height < canvas.height - 10) {
                this.dy += this.gravity;
                this.grounded = false;
            } else {
                this.dy = 0;
                this.grounded = true;
                this.jumpCount = 0;
                this.y = canvas.height - 10 - this.height;
            }
            this.draw();
        },
        jump: function() {
            if (this.grounded) {
                this.dy = -this.jumpForce; this.grounded = false; this.jumpCount = 1;
                playSound('jump');
            } else if (this.jumpCount < this.maxJumps) {
                this.dy = -this.jumpForce * 0.9; this.jumpCount++;
                playSound('jump');
                for(let i=0; i<8; i++) jumpParticles.push(new JumpParticle(this.x + 20, this.y + 30));
            }
        }
    };

    let obstacles = [];
    class Obstacle {
        constructor() {
            // Random Size Generator
            const sizeR = Math.random();
            if (sizeR < 0.33) {
                this.w = 20; this.h = 30; // Small
            } else if (sizeR < 0.66) {
                this.w = 30; this.h = 50; // Medium
            } else {
                this.w = 40; this.h = 65; // Large
            }
            
            this.x = canvas.width;
            this.y = canvas.height - 10 - this.h;
            this.passed = false;
        }
        draw(theme) {
            ctx.fillStyle = theme.obsColor;
            if(theme.obsType === 'lollipop') {
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + (this.w/2)-2, this.y + 15, 4, this.h-15);
                ctx.fillStyle = theme.obsColor; 
                ctx.beginPath(); ctx.arc(this.x + this.w/2, this.y + this.w/2, this.w/2, 0, Math.PI*2); ctx.fill();
            } else if(theme.obsType === 'rock') {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.h);
                ctx.lineTo(this.x + this.w/2, this.y);
                ctx.lineTo(this.x + this.w, this.y + this.h);
                ctx.fill();
            } else {
                ctx.fillRect(this.x, this.y, this.w, this.h);
                // Detail (Prickles)
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(this.x+5, this.y+10, this.w-10, 5);
            }
        }
        update(theme) {
            this.x -= gameSpeed;
            this.draw(theme);
        }
    }

    let heartCoins = [];
    class HeartCoin {
        constructor() {
            this.size = 20; this.x = canvas.width;
            this.y = Math.random() > 0.5 ? 230 : 150; 
            this.collected = false;
            this.floatOffset = Math.random() * Math.PI * 2;
        }
        update() {
            this.x -= gameSpeed;
            const floatY = Math.sin(frame * 0.1 + this.floatOffset) * 5;
            if (!this.collected) this.draw(this.y + floatY);
        }
        draw(drawY) {
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            const x = this.x; const y = drawY; const size = this.size;
            ctx.moveTo(x, y + size/4);
            ctx.quadraticCurveTo(x, y, x + size/2, y);
            ctx.quadraticCurveTo(x + size, y, x + size, y + size/4);
            ctx.quadraticCurveTo(x + size, y + size/2, x + size/2, y + size*0.9);
            ctx.quadraticCurveTo(x, y + size/2, x, y + size/4);
            ctx.fill();
        }
    }

    class JumpParticle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 5 + 3;
            this.speedX = (Math.random() - 0.5) * 4;
            this.speedY = (Math.random() - 0.5) * 4;
            this.life = 1.0;
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.05; }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }

    let jumpParticles = [];

    // --- MAIN LOOP ---
    function animate() {
        if (!gameRunning || isPaused) return;

        // Logic
        frame++;
        
        // --- DYNAMIC BACKGROUND SYSTEM ---
        const theme = themes.find(t => t.id === currentThemeId) || themes[0];
        // Cycle: Day -> Sunset -> Night -> Day
        const cycle = (frame % 3000) / 3000;
        let bgColor = theme.sky;
        
        // Very basic transition logic using overlay opacity or just if-blocks
        // To keep code simple, we adjust the base color slightly based on time
        if (theme.id === 0) { // Only dynamic on default
            if (cycle > 0.3 && cycle < 0.5) bgColor = '#ffccbc'; // Sunset
            if (cycle > 0.5 && cycle < 0.8) bgColor = '#2c3e50'; // Night
        }

        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = theme.ground;
        ctx.fillRect(0, canvas.height - 10, canvas.width, 10);

        score += 0.1;
        scoreText.innerText = Math.floor(score);
        if (Math.floor(score) % 100 === 0) gameSpeed += 0.02;

        if (frame % 90 === 0 && Math.random() > 0.1) obstacles.push(new Obstacle());

        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            obs.update(theme);

            if (!obs.passed && obs.x + obs.w < dino.x) {
                obs.passed = true;
                obstacleCombo++;
                if (obstacleCombo > 0 && obstacleCombo % 5 === 0) {
                    const phrases = ["Lovely!", "Slay!", "Wow!", "Nice!", "Epic!"];
                    const text = phrases[Math.floor(Math.random()*phrases.length)];
                    hypeTexts.push(new HypeText(text, dino.x, dino.y - 30));
                    currency += 5;
                    playSound('hype');
                    updateWalletUI();
                }
            }

            // Variable Collision Box
            if (dino.x < obs.x + obs.w - 8 && dino.x + dino.width - 8 > obs.x + 8 &&
                dino.y < obs.y + obs.h - 5 && dino.y + dino.height > obs.y + 5) {
                dino.crashed = true;
                dino.draw(); 
                playSound('crash');
                gameOver();
                return; 
            }

            if (obs.x + obs.w < 0) { obstacles.splice(i, 1); i--; }
        }

        if (frame % 200 === 0) heartCoins.push(new HeartCoin());
        for (let i = 0; i < heartCoins.length; i++) {
            let c = heartCoins[i]; c.update();
            if (!c.collected && dino.x < c.x + c.size && dino.x + dino.width > c.x &&
                dino.y < c.y + c.size && dino.y + dino.height > c.y) {
                    c.collected = true; currency++; 
                    playSound('coin');
                    updateWalletUI();
            }
            if (c.x + c.size < 0 || c.collected) { heartCoins.splice(i, 1); i--; }
        }

        for(let i=0; i<hypeTexts.length; i++) {
            hypeTexts[i].update();
            hypeTexts[i].draw();
            if(hypeTexts[i].life <= 0) { hypeTexts.splice(i, 1); i--; }
        }

        for(let i=0; i<jumpParticles.length; i++) {
            let p = jumpParticles[i]; p.update(); p.draw();
            if(p.life <= 0) { jumpParticles.splice(i, 1); i--; }
        }

        if(!dino.crashed) dino.update();

        animationId = requestAnimationFrame(animate);
    }

    // --- GAME CONTROL ---
    function startGame() {
        // Initialize Audio on first user interaction
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        obstacles = []; heartCoins = []; hypeTexts = []; jumpParticles = [];
        score = 0; gameSpeed = 5; frame = 0; obstacleCombo = 0;
        dino.y = 200; dino.dy = 0; dino.jumpCount = 0; dino.crashed = false;
        gameRunning = true; isPaused = false;
        
        homeScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        skinsScreen.classList.add('hidden');
        pauseScreen.classList.add('hidden');
        hudLayer.classList.remove('hidden');

        animate();
    }

    function togglePause() {
        if (!gameRunning) return;
        isPaused = !isPaused;
        
        if (isPaused) {
            pauseScreen.classList.remove('hidden');
            cancelAnimationFrame(animationId);
        } else {
            pauseScreen.classList.add('hidden');
            animate();
        }
    }

    function showShop() {
        homeScreen.classList.add('hidden');
        skinsScreen.classList.remove('hidden');
        renderShop();
    }

    function showHome() {
        gameRunning = false; isPaused = false;
        cancelAnimationFrame(animationId);
        
        homeScreen.classList.remove('hidden');
        skinsScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        pauseScreen.classList.add('hidden');
        hudLayer.classList.add('hidden');

        ctx.fillStyle = '#fff0f3'; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = '#ffb7b2'; ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
        dino.crashed = false; dino.y = 200; dino.draw();
    }

    function gameOver() {
        gameRunning = false;
        cancelAnimationFrame(animationId);
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('lovelyDinoHighScore', highScore);
            homeHighScoreSpan.innerText = Math.floor(highScore);
        }
        document.getElementById('finalScore').innerText = Math.floor(score);
        document.getElementById('finalBest').innerText = Math.floor(highScore);
        
        const failMessage = document.getElementById('failMessage');
        const msgs = ["Ouch!", "Oh no!", "Bonk!", "Oops!"];
        failMessage.innerText = msgs[Math.floor(Math.random()*msgs.length)];

        gameOverScreen.classList.remove('hidden');
        hudLayer.classList.add('hidden');
    }

    // --- INPUTS ---
    window.addEventListener('keydown', e => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            if (gameRunning && !isPaused) dino.jump();
            else if (!gameRunning && homeScreen.classList.contains('hidden')) startGame();
        }
        if (e.code === 'Escape' || e.code === 'KeyP') togglePause();
    });
    
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (gameRunning && !isPaused) dino.jump();
    });

    showHome();

</script>
</body>
